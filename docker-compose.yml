services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the persistent /data volume
      DATABASE_URL: sqlite:////data/seg.db
    volumes:
      - seg_data:/data
      - seg_reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  seg_data:
  seg_reports:
