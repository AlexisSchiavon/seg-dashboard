<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SEG · Talent Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">SEG <span>·</span> Intelligence</div>
    <div class="nav-right">
      <div class="live-pill" id="sync-pill"><span class="live-dot" id="sync-dot"></span><span id="sync-text">Última sync: hace -- min</span></div>
    </div>
  </nav>

  <div class="tabbar">
    <div class="tab active" onclick="setPage('overview', event)">Resumen</div>
    <div class="tab" onclick="setPage('talent', event)">Por talento</div>
    <div class="tab" onclick="setPage('funnel', event)">Funnel</div>
    <div class="tab" onclick="setPage('leads', event)">Leads</div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="sync-banner-wrap"></div>

  <!-- ========== RESUMEN TAB ========== -->
  <div class="page active" id="page-overview">
    <div class="spacer"></div>

    <!-- Sincronizar ahora button -->
    <div class="section">
      <button class="btn primary" id="sync-btn" onclick="triggerSync()">Sincronizar ahora</button>
    </div>

    <!-- KPI grid: 4 tiles — Pipeline total (accent), En negociación (amber), Cerrados (purple), En campaña (green) -->
    <div class="section">
      <div class="kpi-grid" id="kpi-grid">
        <!-- Populated by loadSummary() → renderKpis() -->
      </div>
    </div>

    <!-- Leads overview: 2 tiles — Leads totales (blue), Calificados (green) — D-37/DASH-04 -->
    <div class="section">
      <div class="section-title">Leads</div>
      <div class="kpi-grid" id="leads-overview-grid">
        <div class="kpi blue">
          <div class="kpi-label">Leads totales</div>
          <div class="kpi-val blue" id="leads-totales-val">--</div>
          <div class="kpi-sub">Gmail</div>
        </div>
        <div class="kpi green">
          <div class="kpi-label">Calificados</div>
          <div class="kpi-val green" id="calificados-val">--</div>
          <div class="kpi-sub">Aprobados</div>
        </div>
      </div>
    </div>

    <!-- Ranking de talentos -->
    <div class="section">
      <div class="section-title">Ranking de talentos</div>
      <div class="card" id="ranking-list">
        <!-- Populated by loadSummary() → renderRanking() -->
      </div>
    </div>

    <!-- Actividad reciente -->
    <div class="section">
      <div class="section-title">Actividad reciente</div>
      <div class="card" id="activity-list">
        <!-- Populated by loadSummary() → renderActivity() -->
      </div>
    </div>

    <div class="spacer"></div>
  </div>

  <!-- ========== POR TALENTO TAB ========== -->
  <!-- D-28 section order: Selector → KPIs → Funnel → Deals activos → Categorías de marca → Oportunidades perdidas -->
  <div class="page" id="page-talent">
    <div class="spacer"></div>

    <!-- (1) Talent selector — horizontal scrollable row of talent cards -->
    <div class="section">
      <div id="talent-selector" class="talent-selector">
        <!-- Populated by loadTalentSelector() -->
      </div>
    </div>

    <!-- (2) Per-talent KPI grid -->
    <div class="section">
      <div class="kpi-grid" id="talent-kpis">
        <!-- Populated by loadTalentDetail() → renderKpis() into talent-kpis -->
      </div>
    </div>

    <!-- (3) Per-talent funnel -->
    <div class="section">
      <div class="section-title">Funnel</div>
      <div class="card">
        <div id="talent-funnel">
          <!-- Populated by loadTalentDetail() → renderTalentFunnel() -->
        </div>
      </div>
    </div>

    <!-- (4) Deals activos -->
    <div class="section">
      <div class="section-title">Deals activos</div>
      <div class="card" id="talent-deals">
        <!-- Populated by loadTalentDetail() → renderTalentDeals() -->
      </div>
    </div>

    <!-- (5) Categorías de marca — donut chart + legend (D-26/D-27) -->
    <div class="section">
      <div class="section-title">Categorías de marca</div>
      <div class="card" id="brand-donut-card">
        <div class="donut-wrap">
          <div id="brand-donut">
            <!-- SVG conic-gradient donut populated by renderBrandDonut() -->
          </div>
          <div id="brand-legend" class="donut-legend">
            <!-- Legend rows populated by renderBrandDonut() -->
          </div>
        </div>
      </div>
    </div>

    <!-- (6) Oportunidades perdidas — per-reason summary + deal list (D-25) -->
    <!-- NOTE: Lead-source section intentionally absent per D-28 (no data source until Phase 3) -->
    <div class="section">
      <div class="section-title">Oportunidades perdidas</div>
      <div class="card">
        <div id="lost-summary">
          <!-- Per-reason summary line populated by renderLostOpportunities() -->
        </div>
        <div id="lost-list">
          <!-- Itemized lost deals populated by renderLostOpportunities() -->
        </div>
      </div>
    </div>

    <div class="spacer"></div>
  </div>

  <!-- ========== FUNNEL TAB ========== -->
  <div class="page" id="page-funnel">
    <div class="spacer"></div>

    <!-- Funnel completo: 6 stages -->
    <div class="section">
      <div class="section-title">Funnel completo</div>
      <div class="card">
        <div id="funnel-rows">
          <!-- Populated by loadFunnel() → renderFunnel() -->
        </div>
      </div>
    </div>

    <!-- Bottleneck alert slot -->
    <div class="section" id="bottleneck-slot">
      <!-- Populated by loadFunnel(): .alert.warn or .alert.info -->
    </div>

    <div class="spacer"></div>
  </div>

  <!-- ========== LEADS TAB ========== -->
  <!-- D-36: score pills colored by range; T-03B-01: all Sheet strings via escHtml -->
  <div class="page" id="page-leads">
    <div class="spacer"></div>

    <!-- KPI tiles: Leads totales, Calificados, Gmail (source breakdown) -->
    <div class="section">
      <div class="kpi-grid" id="leads-kpi-grid">
        <!-- Populated by loadLeadsSummary() -->
      </div>
    </div>

    <!-- Per-talent bars: count + calificados -->
    <div class="section">
      <div class="section-title">Leads por talento</div>
      <div class="card" id="leads-by-talent">
        <!-- Populated by loadLeadsSummary() -->
      </div>
    </div>

    <!-- Filterable leads list -->
    <div class="section">
      <div class="section-title">Leads recientes</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
        <select id="filter-talent" style="flex:1;min-width:120px;background:var(--bg3);color:var(--text1);border:1px solid var(--bg5);border-radius:8px;padding:6px 10px;font-size:13px;">
          <option value="">Todos los talentos</option>
        </select>
        <select id="filter-status" style="flex:1;min-width:120px;background:var(--bg3);color:var(--text1);border:1px solid var(--bg5);border-radius:8px;padding:6px 10px;font-size:13px;">
          <option value="">Todos los estados</option>
          <option value="✅ Aprobado - Respuesta enviada">Aprobado</option>
          <option value="🚫 Remitente bloqueado">Bloqueado</option>
          <option value="En revisión">En revisión</option>
        </select>
        <select id="filter-fuente" style="flex:1;min-width:100px;background:var(--bg3);color:var(--text1);border:1px solid var(--bg5);border-radius:8px;padding:6px 10px;font-size:13px;">
          <option value="">Todas las fuentes</option>
          <option value="Gmail">Gmail</option>
        </select>
      </div>
      <div class="card" id="leads-list">
        <!-- Populated by loadLeads() -->
      </div>
    </div>

    <div class="spacer"></div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/leads.js"></script>
</body>
</html>
