<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>SEG · Talent Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">SEG <span>·</span> Intelligence</div>
    <div class="nav-right">
      <div class="live-pill" id="sync-pill"><span class="live-dot" id="sync-dot"></span><span id="sync-text">Última sync: hace -- min</span></div>
    </div>
  </nav>

  <div class="tabbar">
    <div class="tab active" onclick="setPage('overview')">Resumen</div>
    <div class="tab" onclick="setPage('talent')">Por talento</div>
    <div class="tab" onclick="setPage('funnel')">Funnel</div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="sync-banner-wrap"></div>

  <!-- ========== RESUMEN TAB ========== -->
  <div class="page active" id="page-overview">
    <div class="spacer"></div>

    <!-- Sincronizar ahora button -->
    <div class="section">
      <button class="btn primary" id="sync-btn" onclick="triggerSync()">Sincronizar ahora</button>
    </div>

    <!-- KPI grid: 4 tiles — Pipeline total (accent), En negociación (amber), Cerrados (purple), En campaña (green) -->
    <div class="section">
      <div class="kpi-grid" id="kpi-grid">
        <!-- Populated by loadSummary() → renderKpis() -->
      </div>
    </div>

    <!-- Ranking de talentos -->
    <div class="section">
      <div class="section-title">Ranking de talentos</div>
      <div class="card" id="ranking-list">
        <!-- Populated by loadSummary() → renderRanking() -->
      </div>
    </div>

    <!-- Actividad reciente -->
    <div class="section">
      <div class="section-title">Actividad reciente</div>
      <div class="card" id="activity-list">
        <!-- Populated by loadSummary() → renderActivity() -->
      </div>
    </div>

    <div class="spacer"></div>
  </div>

  <!-- ========== POR TALENTO TAB ========== -->
  <div class="page" id="page-talent">
    <!-- Plan 02-03 populates "Por talento" content -->
  </div>

  <!-- ========== FUNNEL TAB ========== -->
  <div class="page" id="page-funnel">
    <div class="spacer"></div>

    <!-- Funnel completo: 6 stages -->
    <div class="section">
      <div class="section-title">Funnel completo</div>
      <div class="card">
        <div id="funnel-rows">
          <!-- Populated by loadFunnel() → renderFunnel() -->
        </div>
      </div>
    </div>

    <!-- Bottleneck alert slot -->
    <div class="section" id="bottleneck-slot">
      <!-- Populated by loadFunnel(): .alert.warn or .alert.info -->
    </div>

    <div class="spacer"></div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
